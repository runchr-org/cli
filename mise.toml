[tools]
# Please also keep the version aligned in the go.mod file
go = { version = '1.26.2', postinstall = "go install github.com/go-delve/delve/cmd/dlv@latest && go install gotest.tools/gotestsum@latest" }
golangci-lint = '2.11.3'
shellcheck = 'latest'
tmux = 'latest'
"go:github.com/entireio/roger-roger/cmd/roger-roger" = 'latest'
"go:github.com/entireio/roger-roger/cmd/entire-agent-roger-roger" = 'latest'

[tasks.fmt]
description = "Run gofmt"
run = "gofmt -s -w ."

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks."test:integration"]
description = "Run integration tests"
run = "go test -tags=integration ./cmd/entire/cli/integration_test/..."

[tasks."test:ci"]
description = "Run all tests (unit + integration + E2E canary) with race detection"
run = """
go test -tags=integration -race ./...
mise run test:e2e:canary
"""

[tasks.check]
description = "Run formatting, linting, and CI tests"
depends = ["fmt", "lint", "test:ci"]

[tasks."build:windows"]
description = "Cross-compile for Windows amd64"
run = "CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o entire.exe ./cmd/entire/"

[tasks."build:windows-arm64"]
description = "Cross-compile for Windows arm64"
run = "CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -o entire-arm64.exe ./cmd/entire/"

# tour:regenerate refreshes the embedded `entire tour` markdown by running
# the agent-driven generation path against the current cobra command tree.
# Required before each release so the shipped binary reflects the live
# command surface; the release CI workflow runs this prior to GoReleaser.
# Local devs can run it manually if they want a "real" tour from a fresh
# checkout — without it, `entire tour` prints the stub.
#
# Atomic write: the regen output goes to a temp file first and only
# replaces embedded/tour.md after validation succeeds. The previous
# shell-redirect form truncated the destination *before* the agent
# finished, so a transient agent failure left the repo with an empty
# stub. Validation also catches the "agent returned a partial response
# that happens to have one ## header" failure mode the CI grep alone
# can't.
#
# Requires `claude` (or another TextGenerator-capable agent) on PATH and
# the corresponding auth (typically ANTHROPIC_API_KEY) in the environment.
[tasks."tour:regenerate"]
description = "Refresh cmd/entire/cli/tour/embedded/tour.md via the agent"
run = '''
set -euo pipefail
tmp=$(mktemp)
trap 'rm -f "$tmp"' EXIT
go run ./cmd/entire tour --regenerate > "$tmp"
header_count=$(grep -c '^## ' "$tmp" || true)
if [ "$header_count" -lt 4 ]; then
  echo "tour:regenerate produced only $header_count ## headers (expected >= 4); aborting" >&2
  cat "$tmp" >&2
  exit 1
fi
if ! grep -q 'https://docs.entire.io/cli' "$tmp"; then
  echo "tour:regenerate missing docs.entire.io footer; aborting" >&2
  cat "$tmp" >&2
  exit 1
fi
mv "$tmp" cmd/entire/cli/tour/embedded/tour.md
'''
