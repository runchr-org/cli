name: Tests
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Keyring
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring
          echo 'somecredstorepass' | gnome-keyring-daemon --unlock
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Core Tests
        env:
          GO_TEST_PARALLEL: "16"
        run: mise run test:ci:core

  test-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [a, b, c]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Keyring
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring
          echo 'somecredstorepass' | gnome-keyring-daemon --unlock
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Integration Tests
        env:
          GO_TEST_PARALLEL: "16"
        run: mise run test:ci:integration:shard -- ${{ matrix.shard }}

  test-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Keyring
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring
          echo 'somecredstorepass' | gnome-keyring-daemon --unlock
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: E2E Canary
        run: mise run test:e2e:canary

  test:
    runs-on: ubuntu-latest
    needs:
      - test-core
      - test-integration
      - test-canary
    if: ${{ always() }}
    steps:
      - name: Check dependencies
        run: |
          [ "${{ needs.test-core.result }}" = "success" ]
          [ "${{ needs.test-integration.result }}" = "success" ]
          [ "${{ needs.test-canary.result }}" = "success" ]
